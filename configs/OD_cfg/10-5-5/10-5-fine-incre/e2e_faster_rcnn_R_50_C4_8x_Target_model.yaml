MODEL:
  META_ARCHITECTURE: "GeneralizedRCNN"
  # WEIGHT: "../BPF/output/10-10/LR005_BS4_FILOD_att1_rpn1_align_rpngt/model_trimmed.pth"
  # SOURCE_WEIGHT: "../BPF/output/10-10/LR005_BS4_FILOD_att1_rpn1_align_rpngt/model_trimmed.pth"
  WEIGHT: "./output/10-10/LR005_BS4_FILOD_BF_att1_rpngt/model_trimmed.pth"
  SOURCE_WEIGHT: "./output/10-10/LR005_BS4_FILOD_BF_att1_rpngt/model_trimmed.pth"
  FINETUNE_WEIGHT: "./output/finetune/sec_10_5_8k/model_final.pth"
  BACKBONE:
    CONV_BODY: "R-50-C4"
  RESNETS:
    BACKBONE_OUT_CHANNELS: 1024
  RPN:
    USE_FPN: False
    ANCHOR_STRIDE: (16,)
    PRE_NMS_TOP_N_TRAIN: 12000
    PRE_NMS_TOP_N_TEST: 6000
    POST_NMS_TOP_N_TRAIN: 2000
    POST_NMS_TOP_N_TEST: 1000
  ROI_HEADS:
    USE_FPN: False
  ROI_BOX_HEAD:
    POOLER_RESOLUTION: 7
    POOLER_SCALES: (0.0625,)
    POOLER_SAMPLING_RATIO: 0
    FEATURE_EXTRACTOR: "ResNet50Conv5ROIFeatureExtractor"
    PREDICTOR: "FastRCNNPredictor"
    NUM_CLASSES: 16 # total classes : 20 + 1
    NAME_OLD_CLASSES: ["aeroplane", "bicycle", "bird","boat", "bottle", "bus", "car", "cat", "chair", "cow", ]
    NAME_NEW_CLASSES: ["diningtable", "dog", "horse", "motorbike", "person"]
    NAME_EXCLUDED_CLASSES: ["pottedplant", "sheep", "sofa", "train", "tvmonitor"]
DATASETS:
  TRAIN: ("voc_2007_train", "voc_2007_val")
  TEST: ("voc_2007_test",)
DATALOADER:
  SIZE_DIVISIBILITY: 0
SOLVER:
  BASE_LR: 0.004 # start learning rate
  WEIGHT_DECAY: 0.0001
  GAMMA: 0.1  # learning rate decay
  STEPS: (6000,8000)
  MAX_ITER: 9000 #2500  # number of iteration
  CHECKPOINT_PERIOD: 1000 # number of iteration to generate check point
  IMS_PER_BATCH: 4 # number of images per batch
  MOMENTUM: 0.9
TEST: # testing strategy
  IMS_PER_BATCH: 4 # number of images per batch

#NAME: 10-10_LR005_BS4_ROI
OUTPUT_DIR: "output/" # path to store the result
TENSORBOARD_DIR: "output/" # path to store tensorboard info
#DTYPE: "float16"

PSEUDO_LABELS:
  ENABLE: True
  TYPE: 'initial'
  SUPERVISION: True

UNK:
  ENABLE: True
  OBJ_TOPK: 1.0
  ATTN_TOPK: 0.1
  IOU_GT: 0.1